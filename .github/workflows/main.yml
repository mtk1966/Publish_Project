name: Port Based .NET Control with Logs

on:
  repository_dispatch:
    types: [publish_event, unpublish_event]

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile Port Yönetimi ve Log İzleme
        id: ssh_step
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # --- AYARLAR ---
            BASE_DIR="home/Publish_Project" 
            WEB_PROJECT_DIR="ItemStrore.Web"
            PORT="4642"
            # ---------------

            if [ "${{ github.event.action }}" == "publish_event" ]; then
              fuser -k $PORT/tcp || true
              sleep 2
              cd $BASE_DIR || { echo "❌ Ana dizin bulunamadı!"; exit 1; }
              git pull origin master || git pull origin main
              cd $WEB_PROJECT_DIR || { echo "❌ Proje dizini bulunamadı!"; exit 1; }
              
              setsid nohup dotnet run --urls "http://0.0.0.0:$PORT" > output.log 2>&1 &
              
              echo "⏳ Loglar toplanıyor (60 sn)..."
              sleep 60
              
              echo "--- START_LOGS ---"
              if [ -f "output.log" ]; then
                tail -n 30 output.log # Son 30 satırı gönderir (Karakter sınırı için)
              else
                echo "⚠️ Log dosyası bulunamadı."
              fi
              echo "--- END_LOGS ---"

            elif [ "${{ github.event.action }}" == "unpublish_event" ]; then
              fuser -k $PORT/tcp || true
              echo "✅ $PORT portu kapatıldı."
            fi

      - name: Discord'a Log Gönder
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Dağıtım Raporu: ${{ github.event.action }}"
          description: |
            **Durum:** ${{ job.status }}
            **Proje:** ItemStore.Web
            **Sunucu Logları (Son 30 Satır):**
            ```text
            ${{ steps.ssh_step.outputs.stdout }}
            ```
