name: Port Based .NET Control

on:
  repository_dispatch:
    types: [publish_event, unpublish_event]

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile Port Yönetimi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # --- AYARLAR ---
            BASE_DIR="home/Publish_Project" 
            WEB_PROJECT_DIR="ItemStrore.Web"
            PORT="5000"
            # ---------------

            if [ "${{ github.event.action }}" == "publish_event" ]; then
              echo "🚀 Uygulama port kontrolü yapılarak başlatılıyor..."

              # 2. Klasöre gir ve güncelle
              cd $BASE_DIR || { echo "❌ Ana dizin bulunamadı!"; exit 1; }
              git pull origin master 
              
              # 3. Proje klasörüne gir
              cd $WEB_PROJECT_DIR || { echo "❌ Proje dizini bulunamadı!"; exit 1; }
              
              # 4. Portu belirterek arka planda başlat
              setsid nohup dotnet run --urls "http://0.0.0.0:$PORT" > output.log 2>&1 &
              
              sleep 5
              echo "✅ Uygulama $PORT portu üzerinden yayına alındı."

            elif [ "${{ github.event.action }}" == "unpublish_event" ]; then
              echo "🛑 Port serbest bırakılıyor (Uygulama durduruluyor)..."
              
              # Portu kullanan süreci öldür, böylece uygulama kapanır
              fuser -k $PORT/tcp || true
              
              echo "✅ $PORT portu kapatıldı, uygulama durduruldu."
            fi
