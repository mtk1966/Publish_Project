name: Direct .NET Run Control

on:
  repository_dispatch:
    types: [publish_event, unpublish_event]

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile Sunucuya Bağlan ve Çalıştır
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # --- AYARLAR ---
            PROJECT_DIR="/home/publish_project"
            REPO_URL="https://github.com/mtk1966/Publish_Project.git"
            PROJECT_NAME="ItemStrore.Web"
            PORT="5000"

            if [ "${{ github.event.action }}" == "publish_event" ]; then
              echo "🚀 Başlatılıyor..."
              
              # 1. Klasör kontrolü ve Git Clone/Pull
              if [ ! -d "$PROJECT_DIR/.git" ]; then
                echo "📁 Depo bulunamadı, clone yapılıyor..."
                rm -rf $PROJECT_DIR
                git clone $REPO_URL $PROJECT_DIR
              fi

              cd $PROJECT_DIR || exit 1
              
              # Eski süreci öldür
              pkill -f $PROJECT_NAME || true
              
              # Güncel kodu çek
              git pull origin main
              
              # 2. Çalıştır
              setsid nohup dotnet run --project . --urls "http://0.0.0.0:$PORT" > output.log 2>&1 &
              
              sleep 5
              echo "✅ Uygulama $PORT portunda ayağa kalktı."

            elif [ "${{ github.event.action }}" == "unpublish_event" ]; then
              echo "🛑 Durduruluyor..."
              pkill -f $PROJECT_NAME || true
              echo "✅ Kapatıldı."
            fi
