name: Direct .NET Run Control

on:
  repository_dispatch:
    types: [publish_event, unpublish_event]

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile Sunucuya Bağlan ve Çalıştır
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # --- AYARLAR ---
            PROJECT_DIR="/home" # .csproj dosyasının olduğu ana klasör
            PROJECT_NAME="ItemStrore.Web"       # Projenin adı (dotnet run için)
            PORT="5000"
            # ---------------

            if [ "${{ github.event.action }}" == "publish_event" ]; then
              echo "🚀 Kod çekiliyor ve uygulama başlatılıyor..."
              
              # 1. Önce varsa eski süreci öldür (Proje adına göre)
              # 2. Klasöre gir ve kodu çek
              cd $PROJECT_DIR || exit 1
              git pull origin main
              
              # 3. Doğrudan kaynak koddan ayağa kaldır
              # setsid ve nohup kullanarak SSH kopsa da çalışmasını sağlıyoruz
              setsid nohup dotnet run --project . --urls "http://0.0.0.0:$PORT" > output.log 2>&1 &
              
              sleep 5
              echo "✅ Uygulama $PORT portunda doğrudan çalıştırıldı."

            elif [ "${{ github.event.action }}" == "unpublish_event" ]; then
              echo "🛑 Uygulama durduruluyor..."
              pkill -f $PROJECT_NAME || true
              echo "✅ Tüm süreçler sonlandırıldı."
            fi
