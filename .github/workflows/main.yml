name: Direct .NET Control Final

on:
  repository_dispatch:
    types: [publish_event, unpublish_event]

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ve Komut Yönetimi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # --- AYARLARIN (Sunucuna göre bir kez kontrol et) ---
            PROJECT_DIR="/home/publish_project"
            DLL_NAME="ItemStrore.Web.dll"
            PORT="5000"
            # --------------------------------------------------

            if [ "${{ github.event.action }}" == "publish_event" ]; then
              echo "🚀 Güncelleme ve Başlatma Başladı..."
              
              # 1. Eski süreci ismine göre öldür
              pkill -f $DLL_NAME || true
              
              # 2. Dizine git ve kodu güncelle
              cd $PROJECT_DIR || { echo "Dizin bulunamadı!"; exit 1; }
              git pull origin main
              
              # 3. Yayın dosyalarını hazırla
              dotnet publish -c Release -o ./publish
              
              # 4. Arka planda ölümsüz olarak başlat (setsid ve nohup kombinasyonu)
              cd ./publish
              setsid nohup dotnet $DLL_NAME --urls "http://0.0.0.0:$PORT" > output.log 2>&1 &
              
              # Kısa bir süre bekle ve kontrol et
              sleep 3
              echo "✅ İşlem tamamlandı. Port: $PORT"

            elif [ "${{ github.event.action }}" == "unpublish_event" ]; then
              echo "🛑 Durduruluyor..."
              pkill -f $DLL_NAME || true
              echo "✅ Proje kapatıldı."
            fi
