name: ItemStrore Direct Run

on:
  repository_dispatch:
    types: [publish_event, unpublish_event]

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile Sunucuya Bağlan ve Çalıştır
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # --- FOTOĞRAFLARA GÖRE AYARLANMIŞ YOLLAR ---
            BASE_DIR="home/Publish_Project" # SunucudPublish_Projectaki ana repo klasörü
            WEB_PROJECT_DIR="$BASE_DIR/İtemStrore.Web" # .csproj dosyasının olduğu yer
            PROJECT_NAME="ItemStrore.Web" # Pkill için kullanılacak isim
            PORT="5000"
            # -----------------------------------------

            if [ "${{ github.event.action }}" == "publish_event" ]; then
              echo "🚀 Uygulama güncelleniyor ve başlatılıyor..."
              ls
              # 1. Eski süreci öldü
              
              # 2. Ana klasöre git ve kodu çek
              cd $BASE_DIR || { echo "Dizin bulunamadı!"; exit 1; }
              git pull origin main
              
              # 3. Proje klasörüne gir (csproj burada)
              cd $WEB_PROJECT_DIR || { echo "Web projesi dizini bulunamadı!"; exit 1; }
              
              # 4. Doğrudan ayağa kaldır
              setsid nohup dotnet run --urls "http://0.0.0.0:$PORT" > output.log 2>&1 &
              
              sleep 5
              echo "✅ $PROJECT_NAME başarıyla $PORT portunda başlatıldı."

            elif [ "${{ github.event.action }}" == "unpublish_event" ]; then
              echo "🛑 Uygulama durduruluyor..."
              pkill -f $PROJECT_NAME || true
              echo "✅ Uygulama kapatıldı."
            fi
